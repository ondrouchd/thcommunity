# Local, fully self-contained stack – no cloud Supabase required.
#
# Spuštění:   docker compose -f docker-compose.local.yml up --build
#
# Služby:
#   db        – Postgres (image Supabase, obsahuje role anon/authenticated/service_role,
#               schéma auth, funkci auth.uid(), rozšíření a publikaci supabase_realtime)
#   migrate   – jednorázově aplikuje database/*.sql na čerstvou DB
#   auth      – GoTrue (přihlášení přes magic link / OTP)
#   inbucket  – chytač e-mailů; magic-link e-maily si přečtete na http://localhost:9000
#   rest      – PostgREST (volá pouze backend přes service_role)
#   gateway   – nginx, sjednotná brána /auth/v1 + /rest/v1 na http://localhost:8000
#   backend   – .NET API na http://localhost:5000
#   frontend  – React/Vite app na http://localhost:3000
#
# Demo klíče níže jsou veřejně dokumentované Supabase demo JWT podepsané sdíleným
# tajemstvím – slouží VÝHRADNĚ pro lokální vývoj, nikdy je nepoužívejte v produkci.

x-jwt-secret: &jwt_secret "super-secret-jwt-token-with-at-least-32-characters-long"
x-anon-key: &anon_key "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTg5MzQ1NjAwMH0.vh1-dwqULmDALnkn7fUv96Bl3iNGItPua0efQ5vGdoU"
x-service-key: &service_key "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UtZGVtbyIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxODkzNDU2MDAwfQ.ZhKwqCg2ywVpVox0tycMMG7XUhavS0REfb_R1hUSoec"

services:
  db:
    image: supabase/postgres:15.8.1.060
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54322:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    image: postgres:15
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./database:/migrations:ro
    entrypoint:
      - sh
      - -c
      - |
        set -e
        if [ "$$(psql -h db -U postgres -d postgres -tAc "SELECT to_regclass('public.teams')")" = "teams" ]; then
          echo "Schema already present – skipping migrations."
          exit 0
        fi
        echo "Applying database migrations..."
        for f in 001_initial_schema.sql 002_rls_policies.sql 003_realtime.sql 004_security_fixes.sql; do
          echo "  -> $$f"
          psql -h db -U postgres -d postgres -v ON_ERROR_STOP=1 -f /migrations/$$f
        done
        echo "Migrations applied."
    restart: "no"

  auth:
    image: supabase/gotrue:v2.177.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://localhost:8000
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:postgres@db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "http://localhost:3000,http://localhost:3000/*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ISSUER: http://localhost:8000/auth/v1
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_SECRET: *jwt_secret
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: "2500"
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_ADMIN_EMAIL: admin@thcommunity.local
      GOTRUE_SMTP_SENDER_NAME: THcommunity
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    restart: unless-stopped

  inbucket:
    image: inbucket/inbucket:stable
    ports:
      - "9000:9000"   # web UI – zde čtete magic-link e-maily
    restart: unless-stopped

  rest:
    image: postgrest/postgrest:v12.2.8
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: *jwt_secret
      PGRST_DB_USE_LEGACY_GUCS: "false"
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    depends_on:
      - auth
      - rest
    ports:
      - "8000:8000"
    volumes:
      - ./local/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      gateway:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      AppSettings__Supabase__Url: http://localhost:8000
      AppSettings__Supabase__InternalUrl: http://gateway:8000
      AppSettings__Supabase__JwtSecret: *jwt_secret
      AppSettings__Supabase__PublishableKey: *anon_key
      AppSettings__Supabase__SecretKey: *service_key
      Frontend__Url: http://localhost:3000
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: http://localhost:8000
        VITE_SUPABASE_PUBLISHABLE_KEY: *anon_key
        VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  db_data:
