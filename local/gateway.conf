server {
    listen 8000;
    server_name _;

    # GoTrue (auth) – browser and backend reach the auth server through here.
    location /auth/v1/ {
        proxy_pass http://auth:9999/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # PostgREST – only the backend (service_role) talks to this.
    location /rest/v1/ {
        proxy_pass http://rest:3000/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Profile $http_accept_profile;
        proxy_set_header Content-Profile $http_content_profile;
        proxy_set_header Prefer $http_prefer;
    }

    location = /health {
        default_type text/plain;
        return 200 'ok';
    }
}
